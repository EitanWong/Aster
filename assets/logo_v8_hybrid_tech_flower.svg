<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="#ffffff"/>
  
  <!-- Hybrid: Tech-Flower Design -->
  <!-- 6 petals arranged in circle, but with geometric/tech style -->
  <g fill="url(#grad)" opacity="0.9">
    <!-- Petal 1 (top) -->
    <polygon points="100,40 115,70 85,70"/>
    <!-- Petal 2 (top-right) -->
    <polygon points="145,60 160,85 130,80"/>
    <!-- Petal 3 (bottom-right) -->
    <polygon points="155,140 160,170 130,155"/>
    <!-- Petal 4 (bottom) -->
    <polygon points="100,160 115,130 85,130"/>
    <!-- Petal 5 (bottom-left) -->
    <polygon points="45,140 40,170 70,155"/>
    <!-- Petal 6 (top-left) -->
    <polygon points="55,60 40,85 70,80"/>
  </g>
  
  <!-- Center geometric element (tech-inspired) -->
  <g fill="url(#grad)">
    <!-- Outer hexagon -->
    <polygon points="100,75 120,85 120,105 100,115 80,105 80,85" opacity="0.7"/>
    <!-- Inner circle -->
    <circle cx="100" cy="100" r="12" fill="url(#grad)"/>
  </g>
  
  <!-- Accent highlights -->
  <circle cx="100" cy="100" r="8" fill="#ffffff" opacity="0.2"/>
</svg>
