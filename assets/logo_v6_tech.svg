<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="#ffffff"/>
  
  <!-- Modern tech-inspired design - nested squares rotated -->
  <g fill="none" stroke="url(#grad5)" stroke-width="2.5" stroke-linecap="round">
    <!-- Outer square -->
    <rect x="40" y="40" width="120" height="120" rx="8"/>
    <!-- Middle square rotated -->
    <g transform="translate(100, 100) rotate(45) translate(-60, -60)">
      <rect x="0" y="0" width="120" height="120" rx="8" opacity="0.6"/>
    </g>
  </g>
  
  <!-- Center dot -->
  <circle cx="100" cy="100" r="6" fill="url(#grad5)"/>
</svg>
