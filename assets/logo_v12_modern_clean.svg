<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="#ffffff"/>
  
  <!-- Modern petal design - clean and minimal -->
  <g fill="url(#grad3)" opacity="0.9">
    <!-- 6 petals as smooth rounded shapes -->
    <ellipse cx="100" cy="50" rx="14" ry="28" fill="url(#grad3)"/>
    <ellipse cx="100" cy="50" rx="14" ry="28" fill="url(#grad3)" transform="rotate(60 100 100)"/>
    <ellipse cx="100" cy="50" rx="14" ry="28" fill="url(#grad3)" transform="rotate(120 100 100)"/>
    <ellipse cx="100" cy="50" rx="14" ry="28" fill="url(#grad3)" transform="rotate(180 100 100)"/>
    <ellipse cx="100" cy="50" rx="14" ry="28" fill="url(#grad3)" transform="rotate(240 100 100)"/>
    <ellipse cx="100" cy="50" rx="14" ry="28" fill="url(#grad3)" transform="rotate(300 100 100)"/>
  </g>
  
  <!-- Subtle outer ring -->
  <circle cx="100" cy="100" r="68" fill="none" stroke="url(#grad3)" stroke-width="0.8" opacity="0.2"/>
  
  <!-- Inner tech ring -->
  <circle cx="100" cy="100" r="42" fill="none" stroke="url(#grad3)" stroke-width="1.2" opacity="0.4"/>
  
  <!-- Center circle -->
  <circle cx="100" cy="100" r="26" fill="url(#grad3)" opacity="0.8"/>
  
  <!-- Inner highlight -->
  <circle cx="100" cy="100" r="18" fill="#ffffff" opacity="0.15"/>
  
  <!-- Core dot -->
  <circle cx="100" cy="100" r="8" fill="#ffffff" opacity="0.35"/>
</svg>
