<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="#ffffff"/>
  
  <!-- Elegant hybrid: Geometric flower with tech rings -->
  <!-- Outer tech rings -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="url(#grad2)" stroke-width="2" opacity="0.3"/>
  <circle cx="100" cy="100" r="55" fill="none" stroke="url(#grad2)" stroke-width="1.5" opacity="0.2"/>
  
  <!-- 6 elegant petals (flower-inspired) -->
  <g fill="url(#grad2)" opacity="0.85">
    <ellipse cx="100" cy="45" rx="10" ry="25" fill="url(#grad2)"/>
    <ellipse cx="100" cy="45" rx="10" ry="25" fill="url(#grad2)" transform="rotate(60 100 100)"/>
    <ellipse cx="100" cy="45" rx="10" ry="25" fill="url(#grad2)" transform="rotate(120 100 100)"/>
    <ellipse cx="100" cy="45" rx="10" ry="25" fill="url(#grad2)" transform="rotate(180 100 100)"/>
    <ellipse cx="100" cy="45" rx="10" ry="25" fill="url(#grad2)" transform="rotate(240 100 100)"/>
    <ellipse cx="100" cy="45" rx="10" ry="25" fill="url(#grad2)" transform="rotate(300 100 100)"/>
  </g>
  
  <!-- Center tech element -->
  <g fill="url(#grad2)">
    <!-- Hexagon center -->
    <polygon points="100,85 110,90 110,100 100,105 90,100 90,90" opacity="0.6"/>
    <!-- Core circle -->
    <circle cx="100" cy="100" r="8" fill="url(#grad2)"/>
  </g>
  
  <!-- Subtle highlight -->
  <circle cx="100" cy="100" r="5" fill="#ffffff" opacity="0.3"/>
</svg>
