<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="#ffffff"/>
  
  <!-- Clean hybrid: Minimalist tech-flower -->
  <!-- 6 geometric petals (clean lines) -->
  <g stroke="url(#grad3)" stroke-width="2.5" fill="none" stroke-linecap="round">
    <!-- Petal lines radiating from center -->
    <line x1="100" y1="100" x2="100" y2="35" stroke-width="3"/>
    <line x1="100" y1="100" x2="143" y2="57" stroke-width="3"/>
    <line x1="100" y1="100" x2="143" y2="143" stroke-width="3"/>
    <line x1="100" y1="100" x2="100" y2="165" stroke-width="3"/>
    <line x1="100" y1="100" x2="57" y2="143" stroke-width="3"/>
    <line x1="100" y1="100" x2="57" y2="57" stroke-width="3"/>
  </g>
  
  <!-- Petal endpoints (tech nodes) -->
  <g fill="url(#grad3)">
    <circle cx="100" cy="35" r="6"/>
    <circle cx="143" cy="57" r="6"/>
    <circle cx="143" cy="143" r="6"/>
    <circle cx="100" cy="165" r="6"/>
    <circle cx="57" cy="143" r="6"/>
    <circle cx="57" cy="57" r="6"/>
  </g>
  
  <!-- Center element -->
  <g fill="url(#grad3)">
    <!-- Outer ring -->
    <circle cx="100" cy="100" r="18" fill="none" stroke="url(#grad3)" stroke-width="2" opacity="0.5"/>
    <!-- Inner circle -->
    <circle cx="100" cy="100" r="10" fill="url(#grad3)"/>
  </g>
  
  <!-- Center highlight -->
  <circle cx="100" cy="100" r="6" fill="#ffffff" opacity="0.25"/>
</svg>
