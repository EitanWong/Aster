<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="#ffffff"/>
  
  <!-- Ultra-clean design: 6 petals + concentric circles -->
  <!-- Outer ring (very subtle) -->
  <circle cx="100" cy="100" r="72" fill="none" stroke="url(#grad4)" stroke-width="0.5" opacity="0.15"/>
  
  <!-- 6 elegant petals (simple ellipses) -->
  <g fill="url(#grad4)" opacity="0.85">
    <ellipse cx="100" cy="48" rx="12" ry="26"/>
    <ellipse cx="100" cy="48" rx="12" ry="26" transform="rotate(60 100 100)"/>
    <ellipse cx="100" cy="48" rx="12" ry="26" transform="rotate(120 100 100)"/>
    <ellipse cx="100" cy="48" rx="12" ry="26" transform="rotate(180 100 100)"/>
    <ellipse cx="100" cy="48" rx="12" ry="26" transform="rotate(240 100 100)"/>
    <ellipse cx="100" cy="48" rx="12" ry="26" transform="rotate(300 100 100)"/>
  </g>
  
  <!-- Middle ring -->
  <circle cx="100" cy="100" r="50" fill="none" stroke="url(#grad4)" stroke-width="1" opacity="0.3"/>
  
  <!-- Inner circle (main element) -->
  <circle cx="100" cy="100" r="32" fill="url(#grad4)" opacity="0.75"/>
  
  <!-- Inner glow -->
  <circle cx="100" cy="100" r="24" fill="#ffffff" opacity="0.1"/>
  
  <!-- Center point -->
  <circle cx="100" cy="100" r="9" fill="#ffffff" opacity="0.3"/>
</svg>
