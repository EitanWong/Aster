<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="#ffffff"/>
  
  <!-- Outer hexagon -->
  <polygon points="100,20 160,50 160,150 100,180 40,150 40,50" fill="none" stroke="url(#grad3)" stroke-width="1" opacity="0.2"/>
  
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="75" fill="none" stroke="url(#grad3)" stroke-width="1" opacity="0.25"/>
  
  <!-- 6 outer tech nodes -->
  <g fill="url(#grad3)" opacity="0.8">
    <circle cx="100" cy="25" r="4.5"/>
    <circle cx="170" cy="60" r="4.5"/>
    <circle cx="170" cy="140" r="4.5"/>
    <circle cx="100" cy="175" r="4.5"/>
    <circle cx="30" cy="140" r="4.5"/>
    <circle cx="30" cy="60" r="4.5"/>
  </g>
  
  <!-- Connection lines (full network) -->
  <g stroke="url(#grad3)" stroke-width="1" opacity="0.4">
    <!-- Radial lines -->
    <line x1="100" y1="25" x2="100" y2="65"/>
    <line x1="170" y1="60" x2="135" y2="85"/>
    <line x1="170" y1="140" x2="135" y2="115"/>
    <line x1="100" y1="175" x2="100" y2="135"/>
    <line x1="30" y1="140" x2="65" y2="115"/>
    <line x1="30" y1="60" x2="65" y2="85"/>
    <!-- Hexagon connections -->
    <line x1="170" y1="60" x2="30" y2="60" opacity="0.25"/>
    <line x1="170" y1="140" x2="30" y2="140" opacity="0.25"/>
    <line x1="100" y1="25" x2="170" y2="60" opacity="0.15"/>
    <line x1="100" y1="25" x2="30" y2="60" opacity="0.15"/>
  </g>
  
  <!-- 6 elegant petals -->
  <g fill="url(#grad3)" opacity="0.85">
    <ellipse cx="100" cy="48" rx="12" ry="26"/>
    <ellipse cx="100" cy="48" rx="12" ry="26" transform="rotate(60 100 100)"/>
    <ellipse cx="100" cy="48" rx="12" ry="26" transform="rotate(120 100 100)"/>
    <ellipse cx="100" cy="48" rx="12" ry="26" transform="rotate(180 100 100)"/>
    <ellipse cx="100" cy="48" rx="12" ry="26" transform="rotate(240 100 100)"/>
    <ellipse cx="100" cy="48" rx="12" ry="26" transform="rotate(300 100 100)"/>
  </g>
  
  <!-- Middle ring -->
  <circle cx="100" cy="100" r="50" fill="none" stroke="url(#grad3)" stroke-width="1.5" opacity="0.45"/>
  
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="35" fill="none" stroke="url(#grad3)" stroke-width="0.8" opacity="0.3"/>
  
  <!-- 6 inner nodes -->
  <g fill="url(#grad3)" opacity="0.8">
    <circle cx="100" cy="50" r="3.5"/>
    <circle cx="143" cy="75" r="3.5"/>
    <circle cx="143" cy="125" r="3.5"/>
    <circle cx="100" cy="150" r="3.5"/>
    <circle cx="57" cy="125" r="3.5"/>
    <circle cx="57" cy="75" r="3.5"/>
  </g>
  
  <!-- Inner connections -->
  <g stroke="url(#grad3)" stroke-width="0.8" opacity="0.3">
    <line x1="100" y1="50" x2="143" y2="75"/>
    <line x1="143" y1="75" x2="143" y2="125"/>
    <line x1="143" y1="125" x2="100" y2="150"/>
    <line x1="100" y1="150" x2="57" y2="125"/>
    <line x1="57" y1="125" x2="57" y2="75"/>
    <line x1="57" y1="75" x2="100" y2="50"/>
  </g>
  
  <!-- Core circle -->
  <circle cx="100" cy="100" r="32" fill="url(#grad3)" opacity="0.75"/>
  
  <!-- Inner glow -->
  <circle cx="100" cy="100" r="24" fill="#ffffff" opacity="0.1"/>
  
  <!-- Center hexagon -->
  <polygon points="100,88 108,92 108,100 100,104 92,100 92,92" fill="#ffffff" opacity="0.35"/>
  
  <!-- Center point -->
  <circle cx="100" cy="100" r="6" fill="#ffffff" opacity="0.45"/>
</svg>
