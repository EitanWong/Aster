<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="#ffffff"/>
  
  <!-- Elegant flower-inspired petals -->
  <g fill="url(#grad6)">
    <!-- 6 petals arranged in circle -->
    <ellipse cx="100" cy="50" rx="12" ry="30" fill="url(#grad6)"/>
    <ellipse cx="100" cy="50" rx="12" ry="30" fill="url(#grad6)" transform="rotate(60 100 100)"/>
    <ellipse cx="100" cy="50" rx="12" ry="30" fill="url(#grad6)" transform="rotate(120 100 100)"/>
    <ellipse cx="100" cy="50" rx="12" ry="30" fill="url(#grad6)" transform="rotate(180 100 100)"/>
    <ellipse cx="100" cy="50" rx="12" ry="30" fill="url(#grad6)" transform="rotate(240 100 100)"/>
    <ellipse cx="100" cy="50" rx="12" ry="30" fill="url(#grad6)" transform="rotate(300 100 100)"/>
  </g>
  
  <!-- Center circle -->
  <circle cx="100" cy="100" r="16" fill="#ffffff" opacity="0.3"/>
  <circle cx="100" cy="100" r="10" fill="url(#grad6)"/>
</svg>
