<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="#ffffff"/>
  
  <!-- 6 smooth petals using bezier curves -->
  <g fill="url(#grad2)" opacity="0.85">
    <!-- Petal 1: Top -->
    <path d="M 100 40 C 108 55 108 75 100 90 C 92 75 92 55 100 40" fill="url(#grad2)"/>
    <!-- Petal 2: Top-Right (60°) -->
    <path d="M 143 60 C 150 72 145 90 130 100 C 125 85 135 68 143 60" fill="url(#grad2)"/>
    <!-- Petal 3: Bottom-Right (120°) -->
    <path d="M 143 140 C 150 128 145 110 130 100 C 125 115 135 132 143 140" fill="url(#grad2)"/>
    <!-- Petal 4: Bottom -->
    <path d="M 100 160 C 108 145 108 125 100 110 C 92 125 92 145 100 160" fill="url(#grad2)"/>
    <!-- Petal 5: Bottom-Left (240°) -->
    <path d="M 57 140 C 50 128 55 110 70 100 C 75 115 65 132 57 140" fill="url(#grad2)"/>
    <!-- Petal 6: Top-Left (300°) -->
    <path d="M 57 60 C 50 72 55 90 70 100 C 75 85 65 68 57 60" fill="url(#grad2)"/>
  </g>
  
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="url(#grad2)" stroke-width="1" opacity="0.25"/>
  
  <!-- Middle ring -->
  <circle cx="100" cy="100" r="48" fill="none" stroke="url(#grad2)" stroke-width="1.5" opacity="0.35"/>
  
  <!-- Inner circle -->
  <circle cx="100" cy="100" r="30" fill="url(#grad2)" opacity="0.7"/>
  
  <!-- Center glow -->
  <circle cx="100" cy="100" r="22" fill="#ffffff" opacity="0.12"/>
  
  <!-- Core -->
  <circle cx="100" cy="100" r="10" fill="#ffffff" opacity="0.3"/>
</svg>
