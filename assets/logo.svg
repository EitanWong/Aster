<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="#ffffff"/>
  
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#e0e7ff" stroke-width="1"/>
  
  <!-- Main star with glow effect -->
  <g filter="url(#glow)">
    <!-- 8-pointed star -->
    <path d="M 100 20 L 120 70 L 170 70 L 130 110 L 150 160 L 100 120 L 50 160 L 70 110 L 30 70 L 80 70 Z" 
          fill="url(#mainGradient)" stroke="#6366f1" stroke-width="1"/>
  </g>
  
  <!-- Inner circle -->
  <circle cx="100" cy="100" r="40" fill="#ffffff" opacity="0.1"/>
  
  <!-- Center dot -->
  <circle cx="100" cy="100" r="6" fill="#ffffff" opacity="0.8"/>
  
  <!-- Accent lines (representing AI/inference) -->
  <g stroke="#a78bfa" stroke-width="1.5" fill="none" opacity="0.5" stroke-linecap="round">
    <line x1="100" y1="30" x2="100" y2="50"/>
    <line x1="100" y1="150" x2="100" y2="170"/>
    <line x1="30" y1="100" x2="50" y2="100"/>
    <line x1="150" y1="100" x2="170" y2="100"/>
  </g>
  
  <!-- Small accent circles -->
  <circle cx="100" cy="35" r="2" fill="#a78bfa" opacity="0.6"/>
  <circle cx="100" cy="165" r="2" fill="#a78bfa" opacity="0.6"/>
  <circle cx="35" cy="100" r="2" fill="#a78bfa" opacity="0.6"/>
  <circle cx="165" cy="100" r="2" fill="#a78bfa" opacity="0.6"/>
</svg>
