<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="#ffffff"/>
  
  <!-- Minimalist geometric design - upward arrow/spark -->
  <g fill="url(#grad4)">
    <!-- Main triangle pointing up -->
    <polygon points="100,30 160,140 40,140"/>
  </g>
  
  <!-- Inner highlight -->
  <polygon points="100,50 140,120 60,120" fill="#ffffff" opacity="0.2"/>
  
  <!-- Accent line at bottom -->
  <line x1="60" y1="140" x2="140" y2="140" stroke="url(#grad4)" stroke-width="3" opacity="0.6"/>
</svg>
