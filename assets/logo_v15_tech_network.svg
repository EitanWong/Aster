<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="#ffffff"/>
  
  <!-- Outer hexagon (tech element) -->
  <polygon points="100,25 155,55 155,145 100,175 45,145 45,55" fill="none" stroke="url(#grad2)" stroke-width="0.8" opacity="0.2"/>
  
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="72" fill="none" stroke="url(#grad2)" stroke-width="1" opacity="0.25"/>
  
  <!-- 6 tech nodes on outer ring -->
  <g fill="url(#grad2)" opacity="0.7">
    <circle cx="100" cy="28" r="4"/>
    <circle cx="164" cy="64" r="4"/>
    <circle cx="164" cy="136" r="4"/>
    <circle cx="100" cy="172" r="4"/>
    <circle cx="36" cy="136" r="4"/>
    <circle cx="36" cy="64" r="4"/>
  </g>
  
  <!-- Connection lines (network effect) -->
  <g stroke="url(#grad2)" stroke-width="1" opacity="0.35">
    <line x1="100" y1="28" x2="100" y2="68"/>
    <line x1="164" y1="64" x2="132" y2="88"/>
    <line x1="164" y1="136" x2="132" y2="112"/>
    <line x1="100" y1="172" x2="100" y2="132"/>
    <line x1="36" y1="136" x2="68" y2="112"/>
    <line x1="36" y1="64" x2="68" y2="88"/>
    <!-- Cross connections -->
    <line x1="164" y1="64" x2="36" y2="64" opacity="0.2"/>
    <line x1="164" y1="136" x2="36" y2="136" opacity="0.2"/>
  </g>
  
  <!-- 6 elegant petals -->
  <g fill="url(#grad2)" opacity="0.85">
    <ellipse cx="100" cy="48" rx="12" ry="26"/>
    <ellipse cx="100" cy="48" rx="12" ry="26" transform="rotate(60 100 100)"/>
    <ellipse cx="100" cy="48" rx="12" ry="26" transform="rotate(120 100 100)"/>
    <ellipse cx="100" cy="48" rx="12" ry="26" transform="rotate(180 100 100)"/>
    <ellipse cx="100" cy="48" rx="12" ry="26" transform="rotate(240 100 100)"/>
    <ellipse cx="100" cy="48" rx="12" ry="26" transform="rotate(300 100 100)"/>
  </g>
  
  <!-- Middle ring -->
  <circle cx="100" cy="100" r="50" fill="none" stroke="url(#grad2)" stroke-width="1.2" opacity="0.4"/>
  
  <!-- 6 inner nodes -->
  <g fill="url(#grad2)" opacity="0.75">
    <circle cx="100" cy="50" r="3"/>
    <circle cx="143" cy="75" r="3"/>
    <circle cx="143" cy="125" r="3"/>
    <circle cx="100" cy="150" r="3"/>
    <circle cx="57" cy="125" r="3"/>
    <circle cx="57" cy="75" r="3"/>
  </g>
  
  <!-- Inner circle -->
  <circle cx="100" cy="100" r="32" fill="url(#grad2)" opacity="0.75"/>
  
  <!-- Inner glow -->
  <circle cx="100" cy="100" r="24" fill="#ffffff" opacity="0.1"/>
  
  <!-- Center hexagon -->
  <polygon points="100,88 108,92 108,100 100,104 92,100 92,92" fill="#ffffff" opacity="0.3"/>
  
  <!-- Center point -->
  <circle cx="100" cy="100" r="6" fill="#ffffff" opacity="0.4"/>
</svg>
