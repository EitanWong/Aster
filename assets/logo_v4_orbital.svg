<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="#ffffff"/>
  
  <!-- Orbital rings (representing neural networks/inference) -->
  <circle cx="100" cy="100" r="50" fill="none" stroke="url(#grad3)" stroke-width="3" opacity="0.6"/>
  <circle cx="100" cy="100" r="70" fill="none" stroke="url(#grad3)" stroke-width="2" opacity="0.4"/>
  
  <!-- Center core -->
  <circle cx="100" cy="100" r="12" fill="url(#grad3)"/>
  
  <!-- Accent nodes -->
  <circle cx="100" cy="35" r="5" fill="#8b5cf6" opacity="0.8"/>
  <circle cx="165" cy="100" r="5" fill="#8b5cf6" opacity="0.8"/>
  <circle cx="100" cy="165" r="5" fill="#8b5cf6" opacity="0.8"/>
  <circle cx="35" cy="100" r="5" fill="#8b5cf6" opacity="0.8"/>
</svg>
